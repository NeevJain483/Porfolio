name: Deploy React App to AWS EC2 (No Docker)

on:
  push:
    branches:
      - production

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Set up the Node environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # CHANGE THIS STEP RIGHT HERE:
      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      # Compiles the React code into static assets
      - name: Build Production Bundle
        run: npm run build

      # Transfer assets securely via AppleBoy SSH/SCP Action
      - name: Deploy Assets to EC2 over SSH/SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "dist/*"        # Use "build/*" if using Create React App instead of Vite
          target: "/home/ubuntu/portfolio"
          strip_components: 1