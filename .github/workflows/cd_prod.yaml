name: Deploy React App to AWS EC2 (No Docker)

on:
  push:
    branches:
      - production

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # 1. Add this line if your React app is inside a subfolder (e.g., apps/web or portfolio_v2)
    defaults:
      run:
        working-directory: ./
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # 2. If using a subfolder, add the cache dependency path here:
          cache-dependency-path: './package-lock.json'

      - run: npm ci
      - run: npm run build
      
      - name: Deploy Assets to EC2 over SSH/SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # 3. Update source folder to point to your subfolder build
          source: "dist/*" 
          target: "/portfolio"
          strip_components: 1